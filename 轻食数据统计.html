<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>轻食数据统计</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFA05A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="轻食统计">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #FFF8EB;
            min-height: 100vh;
            padding: 10px;
        }
        
        /* 标题栏 */
        .title-bar {
            background: #fff;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .title-bar h1 {
            font-size: 17px;
            font-weight: 600;
            color: #333;
        }
        
        .title-btns {
            display: flex;
            gap: 8px;
        }
        
        .title-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .title-btn:hover, .title-btn:active {
            background: #f0f0f0;
        }
        
        .title-btn.close:hover, .title-btn.close:active {
            background: #ff5050;
            color: white;
        }
        
        /* 主内容区 */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* 卡片样式 */
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        
        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: #78503C;
            margin-bottom: 12px;
            padding: 10px;
            text-align: center;
            background: #FFF0E0;
            border-radius: 8px;
            border-bottom: 2px solid #FFA05A;
        }

        .card-title.green {
            background: #E8F5E8;
            border-bottom-color: #8CBE8C;
        }
        
        /* 输入区 */
        .input-area {
            width: 100%;
            min-height: 150px;
            border: 2px solid #8CBE8C;
            border-radius: 12px;
            padding: 12px;
            font-size: 15px;
            line-height: 1.6;
            resize: vertical;
            background: #FFFCF5;
            color: #503C32;
            font-family: inherit;
        }
        
        .input-area:focus {
            outline: none;
            border-color: #FFA05A;
        }
        
        .help-text {
            font-size: 13px;
            color: #78503C;
            margin-bottom: 10px;
            opacity: 0.8;
        }
        
        /* 按钮 */
        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 12px;
        }
        
        @media (min-width: 400px) {
            .btn-group {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #FFA05A, #FF8C42);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #8CBE8C, #7AAF7A);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #FFB4B4, #FF9E9E);
            color: #503C32;
        }
        
        .btn-info {
            background: linear-gradient(135deg, #6496DC, #5A8AD0);
        }
        
        /* 表格 */
        .table-container {
            overflow-x: auto;
            margin-top: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        th {
            background: #78503C;
            color: white;
            padding: 12px 8px;
            text-align: center;
            font-weight: 600;
        }
        
        th.green {
            background: #8CBE8C;
        }
        
        td {
            padding: 10px 8px;
            text-align: center;
            background: #FFFCF5;
            border-bottom: 1px solid #f0e6d6;
            background: #FFFCF5;
        }
        
        tr:last-child td {
            border-bottom: none;
        }

        tr:nth-child(even) td {
            background: #FFF8EB;
        }
        
        /* 总计 */
        .total-box {
            background: linear-gradient(135deg, #FFA05A, #FF8C42);
            color: white;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            margin-top: 12px;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 14px;
        }
        
        /* 设置弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #FFF8EB;
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #78503C;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .modal-path {
            background: #fff;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            color: #666;
            word-break: break-all;
            margin-bottom: 16px;
            border: 1px solid #e0d6c6;
        }
        
        .modal-btns {
            display: flex;
            gap: 10px;
        }
        
        .modal-btns .btn {
            flex: 1;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 16px 28px;
            border-radius: 12px;
            font-size: 15px;
            z-index: 2000;
            display: none;
            animation: fadeIn 0.2s ease;
        }
        
        .toast.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }
        
        /* 桌面端适配 */
        @media (min-width: 768px) {
            body {
                padding: 20px;
            }
            
            .main-content {
                flex-direction: row;
            }
            
            .left-panel {
                width: 40%;
            }
            
            .right-panel {
                width: 60%;
            }
            
            .input-area {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- 标题栏 -->
    <div class="title-bar">
        <h1>轻食数据统计程序</h1>
        <div class="title-btns">
            <button class="title-btn" onclick="minimizeWindow()" title="最小化">−</button>
            <button class="title-btn" onclick="toggleFullscreen()" title="全屏">□</button>
            <button class="title-btn" onclick="openSettings()" title="设置">⚙</button>
            <button class="title-btn close" onclick="closeWindow()" title="关闭">×</button>
        </div>
    </div>
    
    <!-- 主内容 -->
    <div class="main-content">
        <!-- 左侧面板 -->
        <div class="left-panel">
            <div class="card">
                <div class="card-title green">数据输入</div>
                <div class="help-text">输入格式：<b>1,2,3,4,5,6,7各10元</b></div>
                <textarea class="input-area" id="inputArea" placeholder="请输入数据..."></textarea>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="calculate()">计算统计</button>
                    <button class="btn btn-success" onclick="loadExample()">加载示例</button>
                    <button class="btn btn-danger" onclick="clearAll()">清空</button>
                    <button class="btn btn-info" onclick="exportExcel()">导出Excel</button>
                    <button class="btn btn-primary" onclick="appendToSummary()" style="background: linear-gradient(135deg, #B478C8, #A066B8);">追加到汇总</button>
                </div>
            </div>
        </div>
        
        <!-- 右侧面板 -->
        <div class="right-panel">
            <!-- 数字明细 -->
            <div class="card">
                <div class="card-title">各数字明细</div>
                <div class="table-container">
                    <table id="detailTable">
                        <thead>
                            <tr>
                                <th class="green">数字</th>
                                <th class="green">出现次数</th>
                                <th class="green">单价明细</th>
                                <th class="green">小计</th>
                            </tr>
                        </thead>
                        <tbody id="detailBody">
                            <tr><td colspan="4" class="empty-state">暂无数据</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- 分组汇总 -->
            <div class="card">
                <div class="card-title orange">分组汇总</div>
                <div class="table-container">
                    <table id="groupTable">
                        <thead>
                            <tr>
                                <th>组别</th>
                                <th>数字个数</th>
                                <th>单价</th>
                                <th>小计</th>
                            </tr>
                        </thead>
                        <tbody id="groupBody">
                            <tr><td colspan="4" class="empty-state">暂无数据</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="total-box" id="totalBox">总计: 0 元</div>
            </div>
        </div>
    </div>
    
    <!-- 设置弹窗 -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-title">设置</div>
            <div class="modal-path" id="currentPath">
                默认：浏览器本地存储
            </div>
                <div class="modal-btns">
                    <button class="btn btn-primary" onclick="changePath()">导出汇总表</button>
                    <button class="btn btn-danger" onclick="clearSummary()" style="background: linear-gradient(135deg, #FFB4B4, #FF9E9E); color: #503C32;">清空汇总表</button>
                    <button class="btn btn-success" onclick="closeSettings()">关闭</button>
                </div>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <!-- SheetJS for Excel export -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <script>
        // 数据存储
        let detailData = [];
        let groupData = [];
        let grandTotal = 0;
        
        // 加载示例
        function loadExample() {
            document.getElementById('inputArea').value = 
                '1，2，3，4，5，6，7各10元\n' +
                '2，3，4，5，6，7，8各20元\n' +
                '3，4，5，6，7，8，9各30元\n' +
                '4，5，6，7，8，9，10各40元';
            showToast('示例已加载');
        }
        
        // 清空
        function clearAll() {
            document.getElementById('inputArea').value = '';
            detailData = [];
            groupData = [];
            grandTotal = 0;
            updateTables();
            showToast('已清空');
        }
        
        // 解析输入数据
        function parseInput(text) {
            const lines = text.trim().split('\n');
            const groups = [];
            
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                
                // 移除中文词汇
                let cleanLine = line.replace(/[各元]/g, ' ');
                
                // 支持多种分隔符
                cleanLine = cleanLine.replace(/[,，\-]/g, ' ');
                const parts = cleanLine.split(/\s+/).filter(p => p);
                
                const numbers = [];
                for (let part of parts) {
                    const num = parseInt(part);
                    if (!isNaN(num)) {
                        numbers.push(num);
                    }
                }
                
                if (numbers.length >= 2) {
                    const price = numbers[numbers.length - 1];
                    const numList = numbers.slice(0, -1);
                    groups.push({
                        start: numList[0],
                        end: numList[numList.length - 1],
                        price: price,
                        numbers: numList
                    });
                }
            }
            
            return groups;
        }
        
        // 计算统计
        function calculate() {
            const text = document.getElementById('inputArea').value.trim();
            if (!text) {
                showToast('请输入数据');
                return;
            }
            
            const groups = parseInput(text);
            if (groups.length === 0) {
                showToast('无法解析输入数据');
                return;
            }
            
            // 统计数字
            const stats = {};
            groupData = [];
            grandTotal = 0;
            
            for (let i = 0; i < groups.length; i++) {
                const group = groups[i];
                let groupTotal = 0;
                
                for (let num of group.numbers) {
                    if (!stats[num]) {
                        stats[num] = { count: 0, prices: [], total: 0 };
                    }
                    stats[num].count++;
                    stats[num].prices.push(group.price);
                    stats[num].total += group.price;
                    groupTotal += group.price;
                }
                
                groupData.push({
                    name: `第${i + 1}组 (${group.start}-${group.end})`,
                    count: group.numbers.length + '个',
                    price: group.price + '元',
                    total: groupTotal + '元'
                });
                
                grandTotal += groupTotal;
            }
            
            // 转换为数组
            detailData = Object.entries(stats)
                .sort((a, b) => a[0] - b[0])
                .map(([num, stat]) => ({
                    number: num,
                    count: stat.count,
                    prices: stat.prices.map(p => p + '元').join('/'),
                    total: stat.total + '元'
                }));
            
            updateTables();
            showToast('统计完成');
        }
        
        // 更新表格
        function updateTables() {
            // 数字明细
            const detailBody = document.getElementById('detailBody');
            if (detailData.length === 0) {
                detailBody.innerHTML = '<tr><td colspan="4" class="empty-state">暂无数据</td></tr>';
            } else {
                detailBody.innerHTML = detailData.map(d => `
                    <tr>
                        <td>${d.number}</td>
                        <td>${d.count}</td>
                        <td>${d.prices}</td>
                        <td>${d.total}</td>
                    </tr>
                `).join('');
            }
            
            // 分组汇总
            const groupBody = document.getElementById('groupBody');
            if (groupData.length === 0) {
                groupBody.innerHTML = '<tr><td colspan="4" class="empty-state">暂无数据</td></tr>';
            } else {
                groupBody.innerHTML = groupData.map(g => `
                    <tr>
                        <td>${g.name}</td>
                        <td>${g.count}</td>
                        <td>${g.price}</td>
                        <td>${g.total}</td>
                    </tr>
                `).join('');
            }
            
            // 总计
            document.getElementById('totalBox').textContent = `总计: ${grandTotal} 元`;
        }
        
        // 导出Excel（带样式美化）
        function exportExcel() {
            if (detailData.length === 0) {
                showToast('请先计算统计数据');
                return;
            }
            
            const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
            
            // 创建工作簿
            const wb = XLSX.utils.book_new();
            
            // 主表数据
            const wsData = [
                ['轻食数据统计报表'],
                [],
                ['各数字明细'],
                ['数字', '出现次数', '单价明细', '小计'],
                ...detailData.map(d => [d.number, d.count, d.prices, d.total]),
                [],
                ['分组汇总'],
                ['组别', '数字个数', '单价', '小计'],
                ...groupData.map(g => [g.name, g.count, g.price, g.total]),
                [],
                [`总计: ${grandTotal} 元`]
            ];
            
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            
            // 设置列宽
            ws['!cols'] = [
                { wch: 10 },
                { wch: 12 },
                { wch: 35 },
                { wch: 12 }
            ];
            
            // 设置行高
            ws['!rows'] = [
                { hpt: 30 },
                { hpt: 15 },
                { hpt: 22 },
                { hpt: 20 }
            ];
            
            // 合并单元格
            ws['!merges'] = [
                { s: { r: 0, c: 0 }, e: { r: 0, c: 3 } },
                { s: { r: 2, c: 0 }, e: { r: 2, c: 3 } },
                { s: { r: detailData.length + 5, c: 0 }, e: { r: detailData.length + 5, c: 3 } },
                { s: { r: wsData.length - 1, c: 0 }, e: { r: wsData.length - 1, c: 3 } }
            ];
            
            // 定义样式
            const titleStyle = {
                font: { name: '微软雅黑', sz: 18, bold: true, color: { rgb: '78503C' } },
                alignment: { horizontal: 'center', vertical: 'center' }
            };
            
            const sectionStyle = {
                font: { name: '微软雅黑', sz: 13, bold: true, color: { rgb: 'FFFFFF' } },
                fill: { fgColor: { rgb: 'FFA05A' }, patternType: 'solid' },
                alignment: { horizontal: 'center', vertical: 'center' },
                border: {
                    top: { style: 'thin', color: { rgb: 'CC7A3A' } },
                    bottom: { style: 'thin', color: { rgb: 'CC7A3A' } }
                }
            };
            
            const headerStyle = {
                font: { name: '微软雅黑', sz: 11, bold: true, color: { rgb: 'FFFFFF' } },
                fill: { fgColor: { rgb: '78503C' }, patternType: 'solid' },
                alignment: { horizontal: 'center', vertical: 'center' },
                border: {
                    top: { style: 'thin', color: { rgb: '000000' } },
                    bottom: { style: 'thin', color: { rgb: '000000' } },
                    left: { style: 'thin', color: { rgb: '000000' } },
                    right: { style: 'thin', color: { rgb: '000000' } }
                }
            };
            
            const greenHeaderStyle = {
                font: { name: '微软雅黑', sz: 11, bold: true, color: { rgb: 'FFFFFF' } },
                fill: { fgColor: { rgb: '8CBE8C' }, patternType: 'solid' },
                alignment: { horizontal: 'center', vertical: 'center' },
                border: {
                    top: { style: 'thin', color: { rgb: '000000' } },
                    bottom: { style: 'thin', color: { rgb: '000000' } },
                    left: { style: 'thin', color: { rgb: '000000' } },
                    right: { style: 'thin', color: { rgb: '000000' } }
                }
            };
            
            const dataStyle = {
                font: { name: '微软雅黑', sz: 10 },
                fill: { fgColor: { rgb: 'FFFCF5' }, patternType: 'solid' },
                alignment: { horizontal: 'center', vertical: 'center' },
                border: {
                    top: { style: 'thin', color: { rgb: 'E6DCC6' } },
                    bottom: { style: 'thin', color: { rgb: 'E6DCC6' } },
                    left: { style: 'thin', color: { rgb: 'E6DCC6' } },
                    right: { style: 'thin', color: { rgb: 'E6DCC6' } }
                }
            };
            
            const dataLeftStyle = {
                font: { name: '微软雅黑', sz: 10 },
                fill: { fgColor: { rgb: 'FFFCF5' }, patternType: 'solid' },
                alignment: { horizontal: 'center', vertical: 'center' },
                border: {
                    top: { style: 'thin', color: { rgb: 'E6DCC6' } },
                    bottom: { style: 'thin', color: { rgb: 'E6DCC6' } },
                    left: { style: 'thin', color: { rgb: 'E6DCC6' } },
                    right: { style: 'thin', color: { rgb: 'E6DCC6' } }
                }
            };

            const totalStyle = {
                font: { name: '微软雅黑', sz: 12, bold: true },
                fill: { fgColor: { rgb: 'FFA05A' }, patternType: 'solid' },
                alignment: { horizontal: 'center', vertical: 'center' },
                border: {
                    top: { style: 'medium', color: { rgb: 'CC7A3A' } },
                    bottom: { style: 'medium', color: { rgb: 'CC7A3A' } },
                    left: { style: 'medium', color: { rgb: 'CC7A3A' } },
                    right: { style: 'medium', color: { rgb: 'CC7A3A' } }
                }
            };
            
            // 计算关键行号
            const detailStartRow = 4; // 数字明细数据开始行
            const detailEndRow = detailStartRow + detailData.length - 1; // 数字明细数据结束行
            const groupTitleRow = detailEndRow + 2; // 分组汇总小标题行
            const groupHeaderRow = groupTitleRow + 1; // 分组汇总表头行
            const groupStartRow = groupHeaderRow + 1; // 分组汇总数据开始行
            const groupEndRow = groupStartRow + groupData.length - 1; // 分组汇总数据结束行
            const totalRow = wsData.length - 1; // 总计行
            
            // 应用样式
            const range = XLSX.utils.decode_range(ws['!ref']);
            for (let R = range.s.r; R <= range.e.r; ++R) {
                for (let C = range.s.c; C <= range.e.c; ++C) {
                    const cellRef = XLSX.utils.encode_cell({ r: R, c: C });
                    if (!ws[cellRef]) continue;
                    
                    // 标题行
                    if (R === 0) {
                        ws[cellRef].s = titleStyle;
                    }
                    // 小标题（各数字明细、分组汇总）
                    else if (R === 2 || R === groupTitleRow) {
                        ws[cellRef].s = sectionStyle;
                    }
                    // 数字明细表头
                    else if (R === 3) {
                        ws[cellRef].s = greenHeaderStyle;
                    }
                    // 数字明细数据
                    else if (R >= detailStartRow && R <= detailEndRow) {
                        ws[cellRef].s = dataStyle;
                    }
                    // 分组汇总表头
                    else if (R === groupHeaderRow) {
                        ws[cellRef].s = headerStyle;
                    }
                    // 分组汇总数据
                    else if (R >= groupStartRow && R <= groupEndRow) {
                        ws[cellRef].s = dataStyle;
                    }
                    // 总计行
                    else if (R === totalRow) {
                        ws[cellRef].s = totalStyle;
                    }
                }
            }
            
            XLSX.utils.book_append_sheet(wb, ws, '轻食数据统计');
            
            // 下载
            XLSX.writeFile(wb, `${today}-轻食数据统计报表.xlsx`);
            showToast('导出成功');
        }
        
        // 追加到汇总表
        function appendToSummary() {
            if (detailData.length === 0) {
                showToast('请先计算统计数据');
                return;
            }
            
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN');
            
            // 从localStorage读取汇总数据
            let summaryData = JSON.parse(localStorage.getItem('qingshi_summary') || '[]');
            
            // 追加当前数据
            for (let d of detailData) {
                summaryData.push({
                    time: timeStr,
                    number: d.number,
                    count: d.count,
                    prices: d.prices,
                    total: d.total
                });
            }
            
            // 保存到localStorage
            localStorage.setItem('qingshi_summary', JSON.stringify(summaryData));
            
            // 导出汇总表
            exportSummary(summaryData);
            
            showToast('已追加到汇总表');
        }
        
        // 导出汇总表
        function exportSummary(summaryData) {
            const wb = XLSX.utils.book_new();
            
            const wsData = [
                ['轻食数据统计汇总表'],
                [],
                ['时间', '数字', '出现次数', '单价明细', '小计'],
                ...summaryData.map(d => [d.time, d.number, d.count, d.prices, d.total])
            ];
            
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            
            // 设置列宽
            ws['!cols'] = [
                { wch: 20 },
                { wch: 10 },
                { wch: 12 },
                { wch: 35 },
                { wch: 12 }
            ];
            
            // 合并标题行
            ws['!merges'] = [
                { s: { r: 0, c: 0 }, e: { r: 0, c: 4 } }
            ];
            
            // 样式定义
            const titleStyle = {
                font: { name: '微软雅黑', sz: 18, bold: true, color: { rgb: '78503C' } },
                alignment: { horizontal: 'center', vertical: 'center' }
            };
            
            const headerStyle = {
                font: { name: '微软雅黑', sz: 11, bold: true, color: { rgb: 'FFFFFF' } },
                fill: { fgColor: { rgb: '78503C' }, patternType: 'solid' },
                alignment: { horizontal: 'center', vertical: 'center' },
                border: {
                    top: { style: 'thin', color: { rgb: '000000' } },
                    bottom: { style: 'thin', color: { rgb: '000000' } },
                    left: { style: 'thin', color: { rgb: '000000' } },
                    right: { style: 'thin', color: { rgb: '000000' } }
                }
            };
            
            const dataStyle = {
                font: { name: '微软雅黑', sz: 10 },
                fill: { fgColor: { rgb: 'FFFCF5' }, patternType: 'solid' },
                alignment: { horizontal: 'center', vertical: 'center' },
                border: {
                    top: { style: 'thin', color: { rgb: 'E6DCC6' } },
                    bottom: { style: 'thin', color: { rgb: 'E6DCC6' } },
                    left: { style: 'thin', color: { rgb: 'E6DCC6' } },
                    right: { style: 'thin', color: { rgb: 'E6DCC6' } }
                }
            };
            
            const dataLeftStyle = {
                font: { name: '微软雅黑', sz: 10 },
                fill: { fgColor: { rgb: 'FFFCF5' }, patternType: 'solid' },
                alignment: { horizontal: 'left', vertical: 'center' },
                border: {
                    top: { style: 'thin', color: { rgb: 'E6DCC6' } },
                    bottom: { style: 'thin', color: { rgb: 'E6DCC6' } },
                    left: { style: 'thin', color: { rgb: 'E6DCC6' } },
                    right: { style: 'thin', color: { rgb: 'E6DCC6' } }
                }
            };
            
            // 应用样式
            const range = XLSX.utils.decode_range(ws['!ref']);
            for (let R = range.s.r; R <= range.e.r; ++R) {
                for (let C = range.s.c; C <= range.e.c; ++C) {
                    const cellRef = XLSX.utils.encode_cell({ r: R, c: C });
                    if (!ws[cellRef]) continue;
                    
                    if (R === 0) {
                        ws[cellRef].s = titleStyle;
                    } else if (R === 2) {
                        ws[cellRef].s = headerStyle;
                    } else if (R > 2) {
                        ws[cellRef].s = C === 3 ? dataLeftStyle : dataStyle;
                    }
                }
            }
            
            XLSX.utils.book_append_sheet(wb, ws, '汇总数据');
            
            const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
            XLSX.writeFile(wb, `${today}-轻食数据统计汇总表.xlsx`);
        }
        
        // 清空汇总表
        function clearSummary() {
            if (confirm('确定要清空汇总表吗？此操作不可恢复。')) {
                localStorage.removeItem('qingshi_summary');
                showToast('汇总表已清空');
            }
        }
        
        // 设置相关
        function openSettings() {
            const summaryData = JSON.parse(localStorage.getItem('qingshi_summary') || '[]');
            const pathText = summaryData.length > 0 
                ? `当前汇总表记录数：${summaryData.length} 条` 
                : '当前汇总表为空';
            document.getElementById('currentPath').textContent = pathText;
            document.getElementById('settingsModal').classList.add('active');
        }
        
        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }
        
        function changePath() {
            // 导出当前汇总表
            const summaryData = JSON.parse(localStorage.getItem('qingshi_summary') || '[]');
            if (summaryData.length === 0) {
                showToast('汇总表为空，无数据可导出');
                return;
            }
            exportSummary(summaryData);
            showToast('汇总表已导出');
        }
        
        // 窗口控制
        function minimizeWindow() {
            showToast('浏览器版不支持最小化');
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        function closeWindow() {
            if (confirm('确定要关闭吗？')) {
                window.close();
                // 如果无法关闭，显示提示
                showToast('请手动关闭浏览器标签页');
            }
        }
        
        // Toast提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('active');
            setTimeout(() => {
                toast.classList.remove('active');
            }, 2000);
        }
        
        // 点击模态框外部关闭
        document.getElementById('settingsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeSettings();
            }
        });
        
        // 加载示例
        loadExample();
    </script>
</body>
</html>
